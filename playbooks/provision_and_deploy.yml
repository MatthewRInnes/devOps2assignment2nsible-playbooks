---
# Playbook: provision_and_deploy.yml
#
# This playbook:
# 1) Runs on the Jenkins controller (localhost) to provision a new EC2 instance
# 2) Adds that instance to an in-memory inventory
# 3) Runs a second play against the new instance to install Docker, pull the selected image tag, and run it on port 80
# 4) Verifies the app responds over HTTP

- name: Provision a new EC2 instance (runs on Jenkins controller)
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # These variables are passed from Jenkins --extra-vars
    image_full: ''
    aws_region: ''
    instance_type: ''
    ami_id: ''
    subnet_id: ''
    security_group_id: ''

    # Docker credentials for docker login on the EC2 instance
    dockerhub_user: ''
    dockerhub_password: ''

    # Container settings
    container_name: 'fastapi-app'
    host_port: '80'
    container_port: '80'

  tasks:
    - name: Validate that required variables are provided
      ansible.builtin.assert:
        that:
          - image_full | length > 0
          - aws_region | length > 0
          - subnet_id | length > 0
          - security_group_id | length > 0
          - dockerhub_user | length > 0
          - dockerhub_password | length > 0
        fail_msg: "One or more required extra-vars were not provided. Edit Jenkinsfile or pass correct --extra-vars."

    - name: Build user_data script to install Docker, run container, and serve on port 80
      # We use user_data so Ansible does NOT need an SSH key.
      ansible.builtin.set_fact:
        user_data_script: |
          #!/bin/bash
          set -e

          export DEBIAN_FRONTEND=noninteractive

          # Install docker + curl for basic checks
          apt-get update -y
          apt-get install -y docker.io curl

          systemctl enable docker
          systemctl start docker

          # Login to Docker Hub (credentials are provided by Jenkins at runtime)
          echo "{{ dockerhub_password }}" | docker login -u "{{ dockerhub_user }}" --password-stdin

          # Pull and run the selected image
          docker pull "{{ image_full }}"

          # Stop any old container with same name (idempotent)
          docker rm -f "{{ container_name }}" || true

          # Run on host_port:container_port (per assignment requirement, port 80)
          docker run -d --name "{{ container_name }}" -p {{ host_port }}:{{ container_port }} "{{ image_full }}"

          # Give the app a moment to start
          sleep 5
      no_log: true

    - name: Provision a new EC2 instance (using user_data to deploy app)
      # no_log avoids printing Docker Hub password/user_data to logs.
      no_log: true
      amazon.aws.ec2_instance:
        region: "{{ aws_region }}"
        instance_type: "{{ instance_type }}"
        image_id: "{{ ami_id }}"
        network:
          subnet_id: "{{ subnet_id }}"
          assign_public_ip: true
        # Use security_group_ids (AWS module expects IDs or names depending on version).
        security_group_ids:
          - "{{ security_group_id }}"
        user_data: "{{ user_data_script }}"
        wait: false
        state: present
        tags:
          Name: "cd-fastapi-{{ image_full | regex_replace(':','-') }}"
      register: ec2

    - name: Determine the new instance public IP
      ansible.builtin.set_fact:
        new_public_ip: "{{ (ec2.instances[0].public_ip_address | default(ec2.instances[0].public_ip)) }}"

    - name: Wait for the application to respond on HTTP port
      ansible.builtin.wait_for:
        host: "{{ new_public_ip }}"
        port: 80
        timeout: 420
        delay: 10

    - name: Verify the application responds with HTTP 200
      ansible.builtin.uri:
        url: "http://{{ new_public_ip }}:{{ host_port }}/"
        return_content: false
        status_code: 200

